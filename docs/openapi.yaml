openapi: 3.0.0
info:
  title: "mango-mdu-service API"
  version: "1.0.0"
  description: |
    REST API definition for mango-mdu-service microservice.
    
    ### Dual-Port HTTP Architecture
    The microservice operates two isolated HTTP interfaces:
    1. **Public Port (default: 16010)**: Exposes the public API interface.
       * Authentication: Enabled by default, uses public/private token validation via OpenWiFi Security service.
    2. **Private Port (default: 17010)**: Exposes internal administration, metrics, and diagnostics.
       * Authentication: Requires both `X-INTERNAL-NAME` and `X-API-KEY` headers.
    
    Both ports serve the unauthenticated health endpoint `/livez`.
servers:
  - url: "https://{host}:{publicPort}"
    description: "Public HTTP API Interface"
    variables:
      host:
        default: "localhost"
        description: "Hostname/IP of the public service"
      publicPort:
        default: "16010"
        description: "Public API interface port"
  - url: "https://{host}:{privatePort}"
    description: "Private/Internal HTTP API Interface"
    variables:
      host:
        default: "localhost"
        description: "Hostname/IP of the private service"
      privatePort:
        default: "17010"
        description: "Private management/diagnostics port"
security:
  - PublicTokenAuth: []
  - PrivateInternalNameAuth: []
    PrivateApiKeyAuth: []
paths:
  /livez:
    get:
      summary: "Liveness probe"
      description: "Checks if the service is running and healthy. This route is unauthenticated and accessible on both the public and private ports."
      security: []
      responses:
        "200":
          description: "Service is healthy and running"
        "500":
          description: "Service is unhealthy"

  /api/v1/system:
    get:
      summary: "Retrieve system diagnostics and metrics"
      description: "Returns system status info or resource usage based on the requested command."
      security:
        - PrivateInternalNameAuth: []
          PrivateApiKeyAuth: []
      parameters:
        - name: "command"
          in: "query"
          required: true
          schema:
            type: "string"
            enum: ["info", "resources"]
      responses:
        "200":
          description: "Successful query execution"
        "400":
          description: "Invalid command query"
    post:
      summary: "Modify log levels or query diagnostics schema"
      description: "Dynamically mutate runtime subsystem log levels or fetch subsystem metadata."
      security:
        - PrivateInternalNameAuth: []
          PrivateApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required:
                - "command"
              properties:
                command:
                  type: "string"
                  enum: ["setloglevel", "getloglevels", "getloglevelnames", "getsubsystemnames"]
                subsystems:
                  type: "array"
                  items:
                    type: "object"
                    required:
                      - "tag"
                      - "value"
                    properties:
                      tag:
                        type: "string"
                      value:
                        type: "string"
      responses:
        "200":
          description: "Successful action execution"
        "400":
          description: "Invalid command or malformed body"

components:
  securitySchemes:
    PublicTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Bearer authentication token for Public API interface endpoints."
    PrivateInternalNameAuth:
      type: apiKey
      in: header
      name: X-INTERNAL-NAME
      description: "Internal identifier header required on the Private API interface."
    PrivateApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: "API Key authorization header required on the Private API interface."
