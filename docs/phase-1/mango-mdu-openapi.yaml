openapi: 3.0.3
info:
  title: Mango MDU Service API
  version: 1.0.0
  description: |
    Northbound API exposed by MDU for Phase 1 workflows.

    This contract defines the API consumed by northbound clients such as the MDU UI.
    It intentionally normalizes downstream platform behavior into stable MDU-owned resources.

    Phase 1 integrations:
    - OWSEC for authentication, user lifecycle (e.g. user listing, profile retrieve/update)
    - PROV for entities, venues, management roles, management policies, contacts, subscribers, and effective scope resolution

    Phase 1 scope:
    - session and normalized access context
    - hierarchy read/write for entity and venue resources
    - user scope assignment, scope lookup, and management of roles, policies, contacts, and subscribers
    - user CRUD is handled directly by OWSEC (identity management), while roles, policies, and operational details are handled by PROV
    - operator listing and creation are handled directly by PROV from the UI, while operator detail retrieval, updates, and deletion are orchestrated via MDU

    Explicit non-goal:
    - billing features are out-of-scope for Phase 1

servers:
  - url: /api/v1
    description: Relative API base path

tags:
  - name: Session
  - name: Hierarchy
  - name: Entities
  - name: Venues
  - name: Users
  - name: Management Roles
  - name: Management Policies
  - name: Contacts
  - name: Subscribers
  - name: Operators

security:
  - bearerAuth: []

paths:


  /session:
    get:
      tags: [Session]
      summary: Get active session and effective access context
      description: |
        Returns the authenticated caller and normalized effective access context.
        Scope assignments are derived from downstream role and policy bindings.
      operationId: getSession
      responses:
        '200':
          description: Active session and normalized access context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /operators:
    get:
      tags: [Operators]
      summary: Retrieve a list of operators
      description: Returns a list of operator profiles.
      operationId: getOperators
      responses:
        '200':
          description: A list of operators
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    post:
      tags: [Operators]
      summary: Create a new operator profile
      description: Creates a new operator profile record.
      operationId: createOperator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOperatorRequest'
      responses:
        '201':
          description: Operator created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorDetail'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /operators/{operatorId}:
    get:
      tags: [Operators]
      summary: Retrieve operator details
      description: Fetches the profile and device configuration rules for the target operator/customer.
      operationId: getOperator
      parameters:
        - $ref: '#/components/parameters/OperatorIdPath'
      responses:
        '200':
          description: Operator details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    put:
      tags: [Operators]
      summary: Update operator details
      description: Updates the target operator name, description, or device upgrade rules.
      operationId: updateOperator
      parameters:
        - $ref: '#/components/parameters/OperatorIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOperatorRequest'
      responses:
        '200':
          description: Operator updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorDetail'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    delete:
      tags: [Operators]
      summary: Delete an operator
      description: Deletes the target operator/customer from the system.
      operationId: deleteOperator
      parameters:
        - $ref: '#/components/parameters/OperatorIdPath'
      responses:
        '204':
          description: Operator deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /operators/{operatorId}/subscribers:
    get:
      tags: [Subscribers]
      summary: List subscribers for an operator
      description: Retrieves the list of subscriber signup entries associated with this operator.
      operationId: listOperatorSubscribers
      parameters:
        - $ref: '#/components/parameters/OperatorIdPath'
      responses:
        '200':
          description: List of subscribers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubscriberSignup'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
  /hierarchy/tree:
    get:
      tags: [Hierarchy]
      summary: Get visible hierarchy tree
      description: |
        Returns the hierarchy visible to the caller.
        Phase 1 normalizes entity and venue resources into a single northbound tree.
      operationId: getHierarchyTree
      parameters:
        - $ref: '#/components/parameters/ScopeEntityId'
      responses:
        '200':
          description: Hierarchy tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HierarchyTreeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /entities:
    get:
      tags: [Entities]
      summary: List entities visible to the caller
      description: Returns normalized entity resources filtered to the caller's effective scope.
      operationId: listEntities
      parameters:
        - $ref: '#/components/parameters/ParentEntityId'
      responses:
        '200':
          description: Entity list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    post:
      tags: [Entities]
      summary: Create an entity
      description: Creates a new Phase 1 entity resource.
      operationId: createEntity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityRequest'
      responses:
        '201':
          description: Entity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityDetail'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /entities/{entityId}:
    get:
      tags: [Entities]
      summary: Get entity detail
      operationId: getEntity
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      responses:
        '200':
          description: Entity detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    put:
      tags: [Entities]
      summary: Update an entity
      operationId: updateEntity
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntityRequest'
      responses:
        '200':
          description: Entity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityDetail'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    delete:
      tags: [Entities]
      summary: Delete an entity
      operationId: deleteEntity
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      responses:
        '204':
          description: Entity deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /entities/{entityId}/venues:
    get:
      tags: [Venues]
      summary: List venues under an entity
      operationId: listEntityVenues
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
        - $ref: '#/components/parameters/ParentVenueId'
      responses:
        '200':
          description: Venue list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    post:
      tags: [Venues]
      summary: Create venue under an entity
      operationId: createVenue
      parameters:
        - $ref: '#/components/parameters/EntityIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVenueRequest'
      responses:
        '201':
          description: Venue created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueDetail'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /venues/{venueId}:
    get:
      tags: [Venues]
      summary: Get venue detail
      operationId: getVenue
      parameters:
        - $ref: '#/components/parameters/VenueIdPath'
      responses:
        '200':
          description: Venue detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    put:
      tags: [Venues]
      summary: Update a venue
      operationId: updateVenue
      parameters:
        - $ref: '#/components/parameters/VenueIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVenueRequest'
      responses:
        '200':
          description: Venue updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueDetail'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    delete:
      tags: [Venues]
      summary: Delete a venue
      operationId: deleteVenue
      parameters:
        - $ref: '#/components/parameters/VenueIdPath'
      responses:
        '204':
          description: Venue deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /policies:
    get:
      tags: [Management Policies]
      summary: Retrieve a list of management policies
      operationId: getPolicies
      responses:
        '200':
          description: A list of management policies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementPolicyListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    post:
      tags: [Management Policies]
      summary: Create a new management policy
      operationId: createPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagementPolicyRequest'
      responses:
        '201':
          description: Policy created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementPolicy'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /policies/{policyId}:
    get:
      tags: [Management Policies]
      summary: Retrieve details of a management policy
      operationId: getPolicy
      parameters:
        - $ref: '#/components/parameters/PolicyIdPath'
      responses:
        '200':
          description: Policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementPolicy'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    put:
      tags: [Management Policies]
      summary: Update a management policy
      operationId: updatePolicy
      parameters:
        - $ref: '#/components/parameters/PolicyIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateManagementPolicyRequest'
      responses:
        '200':
          description: Policy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementPolicy'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    delete:
      tags: [Management Policies]
      summary: Delete a management policy
      operationId: deletePolicy
      parameters:
        - $ref: '#/components/parameters/PolicyIdPath'
      responses:
        '204':
          description: Policy deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /roles:
    get:
      tags: [Management Roles]
      summary: Retrieve a list of management roles
      operationId: getRoles
      responses:
        '200':
          description: A list of management roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementRoleListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    post:
      tags: [Management Roles]
      summary: Create a new management role
      operationId: createRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagementRoleRequest'
      responses:
        '201':
          description: Role created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementRole'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /roles/{roleId}:
    get:
      tags: [Management Roles]
      summary: Retrieve details of a management role
      operationId: getRole
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '200':
          description: Role details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementRole'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    put:
      tags: [Management Roles]
      summary: Update a management role
      operationId: updateRole
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateManagementRoleRequest'
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagementRole'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    delete:
      tags: [Management Roles]
      summary: Delete a management role
      operationId: deleteRole
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: Role deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /users/{userId}/assignments:
    get:
      tags: [Users]
      summary: Get effective scoped assignments for a user
      description: Returns the target user's effective scoped assignments as normalized MDU resources.
      operationId: getUserAssignments
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User scope assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAssignmentsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    post:
      tags: [Users]
      summary: Assign a user to an entity or venue scope
      description: Creates or resolves the scoped access binding for the target user.
      operationId: assignUserToScope
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserAssignmentRequest'
      responses:
        '201':
          description: Assignment created or resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAssignment'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /users/{userId}/assignments/{assignmentId}:
    delete:
      tags: [Users]
      summary: Remove a user's scope assignment
      description: Removes the scoped access binding for the target user by assignment ID.
      operationId: deleteUserAssignment
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/AssignmentIdPath'
      responses:
        '204':
          description: Assignment removed
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
          
  /users/{userId}/access-policy:
    get:
      tags: [Users]
      summary: Retrieve the access policy for a user at a given scope
      description: Fetches the configured management policy and template role for the target user at the specified entity or venue scope.
      operationId: getUserAccessPolicy
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/EntityIdQuery'
        - $ref: '#/components/parameters/VenueIdQuery'
      responses:
        '200':
          description: Access policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessPolicy'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    put:
      tags: [Users]
      summary: Assign or update the access policy for a user
      description: Sets or updates the management role, policies, and resource permissions for the target user at the specified entity or venue scope.
      operationId: updateUserAccessPolicy
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAccessPolicy'
      responses:
        '200':
          description: Access policy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccessPolicy'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    EntityIdPath:
      name: entityId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    VenueIdPath:
      name: venueId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    OperatorIdPath:
      name: operatorId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    ScopeEntityId:
      name: scopeEntityId
      in: query
      required: false
      description: Optional entity scope anchor for tree shaping
      schema:
        $ref: '#/components/schemas/Id'
    ParentEntityId:
      name: parentEntityId
      in: query
      required: false
      description: Optional parent entity filter
      schema:
        $ref: '#/components/schemas/Id'
    ParentVenueId:
      name: parentVenueId
      in: query
      required: false
      description: Optional parent venue filter
      schema:
        $ref: '#/components/schemas/Id'
    EntityIdQueryRequired:
      name: entityId
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    EntityIdQuery:
      name: entityId
      in: query
      required: false
      description: Target entity scope. Either entityId or venueId must be specified.
      schema:
        $ref: '#/components/schemas/Id'
    VenueIdQuery:
      name: venueId
      in: query
      required: false
      description: Target venue scope. Either entityId or venueId must be specified.
      schema:
        $ref: '#/components/schemas/Id'
    AssignmentIdPath:
      name: assignmentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    PolicyIdPath:
      name: policyId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    RoleIdPath:
      name: roleId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'


  responses:
    BadRequestError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnauthorizedError:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ForbiddenError:
      description: Caller is not allowed to perform this action in the resolved scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ConflictError:
      description: Current state conflicts with the requested operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    BackendUnavailableError:
      description: One or more required downstream services are unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    Id:
      type: string
      description: UUID or service-owned opaque identifier

    IsoDateTime:
      type: string
      format: date-time

    HierarchyNodeType:
      type: string
      enum: [operator, entity, venue]

    AssignmentScopeType:
      type: string
      enum: [entity, venue]

    RoleKey:
      type: string
      enum: [root, admin, csr, installer, noc, accounting, system]

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples: [validation_error, no_permission, backend_unavailable, conflict]
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    ScopePathItem:
      type: object
      required: [id, type, name]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        type:
          $ref: '#/components/schemas/HierarchyNodeType'
        name:
          type: string

    RbacDecision:
      type: object
      required: [allowed, mode]
      properties:
        allowed:
          type: boolean
        mode:
          type: string
          enum: [hidden, read_only, interactive]
        reason:
          type: string

    EffectivePermissionSet:
      type: object
      properties:
        hierarchy:
          $ref: '#/components/schemas/RbacDecision'
        users:
          $ref: '#/components/schemas/RbacDecision'
        billing:
          $ref: '#/components/schemas/RbacDecision'
        configurations:
          $ref: '#/components/schemas/RbacDecision'
        devices:
          $ref: '#/components/schemas/RbacDecision'

    UserSummary:
      type: object
      required: [id]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/RoleKey'
        status:
          type: string
        lastLoginAt:
          allOf:
            - $ref: '#/components/schemas/IsoDateTime'
          nullable: true

    SessionAssignment:
      type: object
      required: [assignmentId, scopeType, scopeId, scopeName, path, role]
      properties:
        assignmentId:
          $ref: '#/components/schemas/Id'
        scopeType:
          $ref: '#/components/schemas/AssignmentScopeType'
        scopeId:
          $ref: '#/components/schemas/Id'
        scopeName:
          type: string
        path:
          type: array
          items:
            $ref: '#/components/schemas/ScopePathItem'
        role:
          $ref: '#/components/schemas/RoleKey'
        managementRoleId:
          $ref: '#/components/schemas/Id'
        managementPolicyId:
          $ref: '#/components/schemas/Id'

    SessionContext:
      type: object
      required: [user, assignments, permissions]
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        activeScope:
          allOf:
            - $ref: '#/components/schemas/ScopePathItem'
          nullable: true
        assignments:
          type: array
          items:
            $ref: '#/components/schemas/SessionAssignment'
        permissions:
          $ref: '#/components/schemas/EffectivePermissionSet'

    HierarchyNodeSummary:
      type: object
      properties:
        entityCount:
          type: integer
        venueCount:
          type: integer
        userCount:
          type: integer
        deviceCount:
          type: integer

    HierarchyNode:
      type: object
      required: [id, type, name, parentId, path, selectable, hasChildren]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        type:
          $ref: '#/components/schemas/HierarchyNodeType'
        name:
          type: string
        parentId:
          allOf:
            - $ref: '#/components/schemas/Id'
          nullable: true
        path:
          type: array
          items:
            $ref: '#/components/schemas/ScopePathItem'
        selectable:
          type: boolean
        hasChildren:
          type: boolean
        children:
          type: array
          items:
            $ref: '#/components/schemas/HierarchyNode'
        summary:
          $ref: '#/components/schemas/HierarchyNodeSummary'

    HierarchyTreeResponse:
      type: object
      required: [roots]
      properties:
        roots:
          type: array
          items:
            $ref: '#/components/schemas/HierarchyNode'

    EntitySummary:
      type: object
      required: [id, name, type, path]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
        parentId:
          allOf:
            - $ref: '#/components/schemas/Id'
          nullable: true
        type:
          type: string
          enum: [normal, subscriber]
        path:
          type: array
          items:
            $ref: '#/components/schemas/ScopePathItem'
        venueCount:
          type: integer
        userCount:
          type: integer
        deviceCount:
          type: integer

    EntityDetail:
      allOf:
        - $ref: '#/components/schemas/EntitySummary'
        - type: object
          properties:
            description:
              type: string
            operatorId:
              $ref: '#/components/schemas/Id'
            managementPolicyId:
              $ref: '#/components/schemas/Id'
            managementRoleIds:
              type: array
              items:
                $ref: '#/components/schemas/Id'
            createdAt:
              $ref: '#/components/schemas/IsoDateTime'
            updatedAt:
              $ref: '#/components/schemas/IsoDateTime'

    EntityListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EntitySummary'

    CreateEntityRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        parentEntityId:
          $ref: '#/components/schemas/Id'
        type:
          type: string
          enum: [normal, subscriber]
          default: normal

    UpdateEntityRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    VenueSummary:
      type: object
      required: [id, name, entityId, path]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
        entityId:
          $ref: '#/components/schemas/Id'
        parentVenueId:
          allOf:
            - $ref: '#/components/schemas/Id'
          nullable: true
        path:
          type: array
          items:
            $ref: '#/components/schemas/ScopePathItem'
        deviceCount:
          type: integer

    VenueDetail:
      allOf:
        - $ref: '#/components/schemas/VenueSummary'
        - type: object
          properties:
            description:
              type: string
            managementPolicyId:
              $ref: '#/components/schemas/Id'
            managementRoleIds:
              type: array
              items:
                $ref: '#/components/schemas/Id'
            createdAt:
              $ref: '#/components/schemas/IsoDateTime'
            updatedAt:
              $ref: '#/components/schemas/IsoDateTime'

    VenueListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VenueSummary'

    CreateVenueRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        parentVenueId:
          $ref: '#/components/schemas/Id'

    UpdateVenueRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    UserAssignment:
      type: object
      required: [assignmentId, scopeType, scopeId, scopeName, role, path]
      properties:
        assignmentId:
          $ref: '#/components/schemas/Id'
        scopeType:
          $ref: '#/components/schemas/AssignmentScopeType'
        scopeId:
          $ref: '#/components/schemas/Id'
        scopeName:
          type: string
        role:
          $ref: '#/components/schemas/RoleKey'
        path:
          type: array
          items:
            $ref: '#/components/schemas/ScopePathItem'
        managementRoleId:
          $ref: '#/components/schemas/Id'
        managementPolicyId:
          $ref: '#/components/schemas/Id'
        createdAt:
          $ref: '#/components/schemas/IsoDateTime'

    UserAssignmentsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserAssignment'

    CreateUserAssignmentRequest:
      type: object
      required: [scopeType, scopeId, role]
      properties:
        scopeType:
          $ref: '#/components/schemas/AssignmentScopeType'
        scopeId:
          $ref: '#/components/schemas/Id'
        role:
          $ref: '#/components/schemas/RoleKey'

    UserAccessPolicy:
      type: object
      required: [scope, roleTemplate, resourcePermissions]
      properties:
        scope:
          type: string
          enum: [entity, venue]
        entityId:
          allOf:
            - $ref: '#/components/schemas/Id'
          description: Target entity ID. Required if scope is entity.
        venueId:
          allOf:
            - $ref: '#/components/schemas/Id'
          description: Target venue ID. Required if scope is venue.
        roleTemplate:
          type: string
          description: Role template name (e.g. Admin, Installer, etc.)
        resourcePermissions:
          type: array
          items:
            $ref: '#/components/schemas/ResourcePermission'

    ResourcePermission:
      type: object
      required: [resource, policies]
      properties:
        resource:
          type: string
          enum: [entity, venue, operator, inventory, configuration, management policy, management role]
        policies:
          type: array
          items:
            $ref: '#/components/schemas/PolicyAccessKey'

    PolicyAccessKey:
      type: string
      enum: [NOACCESS, READ, MODIFY, DELETE, LIST, CREATE, FULL]

    OperatorDetail:
      type: object
      required: [name]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
        description:
          type: string
        entityId:
          $ref: '#/components/schemas/Id'
          description: Associated entity ID
        registrationId:
          type: string
        createdAt:
          $ref: '#/components/schemas/IsoDateTime'
        updatedAt:
          $ref: '#/components/schemas/IsoDateTime'

    OperatorSummary:
      type: object
      required: [name]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
        description:
          type: string
        registrationId:
          type: string

    OperatorListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OperatorSummary'

    SubscriberSignup:
      type: object
      required: [email, registrationId, status]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        email:
          type: string
          format: email
        userId:
          $ref: '#/components/schemas/Id'
        operatorId:
          $ref: '#/components/schemas/Id'
        macAddress:
          type: string
        serialNumber:
          type: string
        status:
          type: string
        registrationId:
          type: string
        createdAt:
          $ref: '#/components/schemas/IsoDateTime'

    ManagementPolicy:
      type: object
      required: [name]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
        description:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ManagementPolicyEntry'
        entity:
          $ref: '#/components/schemas/Id'
        venue:
          $ref: '#/components/schemas/Id'
        createdAt:
          $ref: '#/components/schemas/IsoDateTime'
        updatedAt:
          $ref: '#/components/schemas/IsoDateTime'

    ManagementPolicyEntry:
      type: object
      required: [resources, access]
      properties:
        users:
          type: array
          items:
            type: string
        resources:
          type: array
          items:
            type: string
        access:
          type: array
          items:
            $ref: '#/components/schemas/PolicyAccessKey'

    ManagementPolicyListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ManagementPolicy'

    ManagementRole:
      type: object
      required: [name, managementPolicy]
      properties:
        id:
          $ref: '#/components/schemas/Id'
        name:
          type: string
        description:
          type: string
        managementPolicy:
          $ref: '#/components/schemas/Id'
        users:
          type: array
          items:
            $ref: '#/components/schemas/Id'
        entity:
          $ref: '#/components/schemas/Id'
        venue:
          $ref: '#/components/schemas/Id'
        createdAt:
          $ref: '#/components/schemas/IsoDateTime'
        updatedAt:
          $ref: '#/components/schemas/IsoDateTime'

    ManagementRoleListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ManagementRole'

    CreateOperatorRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        registrationId:
          type: string

    UpdateOperatorRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        registrationId:
          type: string

    CreateManagementPolicyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ManagementPolicyEntry'
        entity:
          $ref: '#/components/schemas/Id'
        venue:
          $ref: '#/components/schemas/Id'

    UpdateManagementPolicyRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ManagementPolicyEntry'
        entity:
          $ref: '#/components/schemas/Id'
        venue:
          $ref: '#/components/schemas/Id'

    CreateManagementRoleRequest:
      type: object
      required: [name, managementPolicy]
      properties:
        name:
          type: string
        description:
          type: string
        managementPolicy:
          $ref: '#/components/schemas/Id'
        users:
          type: array
          items:
            $ref: '#/components/schemas/Id'
        entity:
          $ref: '#/components/schemas/Id'
        venue:
          $ref: '#/components/schemas/Id'

    UpdateManagementRoleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        managementPolicy:
          $ref: '#/components/schemas/Id'
        users:
          type: array
          items:
            $ref: '#/components/schemas/Id'
        entity:
          $ref: '#/components/schemas/Id'
        venue:
          $ref: '#/components/schemas/Id'



