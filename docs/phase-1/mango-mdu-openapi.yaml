openapi: 3.0.3
info:
  title: Mango MDU Service API
  version: 1.0.0
  description: |
    Northbound API exposed by MDU for Phase 1 workflows.

    This contract defines the API consumed by northbound clients such as the MDU UI.
    It intentionally normalizes downstream platform behavior into stable MDU-owned resources.

    Phase 1 integrations:
    - OWSEC: authentication, token validation, and user identity/user CRUD handled directly outside MDU
    - PROV: entities, venues, management roles, management policies, effective scope resolution, and operator-scoped subscriber listing

    Phase 1 scope:
    - session/access context, hierarchy/entity/venue wrappers, user-access orchestration, roles/policies orchestration, and operator-scoped subscriber listing only
    - operator listing and creation are handled directly by PROV from the UI (bypassing MDU), while operator detail retrieval, updates, and deletion are orchestrated via MDU

    Explicit non-goal:
    - billing features are out-of-scope for Phase 1

servers:
  - url: /api/v1
    description: Relative API base path

tags:
  - name: Session
  - name: Hierarchy
  - name: Entities
  - name: Venues
  - name: Users
  - name: Management Roles
  - name: Management Policies
  - name: Subscribers
  - name: Operators

security:
  - bearerAuth: []

paths:


  /session:
    get:
      tags: [Session]
      summary: Get active session and effective access context
      description: |
        Returns the authenticated caller and normalized effective access context.
        Scope assignments are derived from downstream role and policy bindings.
      operationId: getSession
      parameters:
        - $ref: '#/components/parameters/XRequestIdHeader'
        - $ref: '#/components/parameters/XCorrelationIdHeader'
      responses:
        '200':
          description: Active session and normalized access context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /operators/{operatorId}:
    get:
      tags: [Operators]
      summary: Retrieve operator details
      description: Fetches the profile details for the target operator/customer.
      operationId: getOperator
      parameters:
        - $ref: '#/components/parameters/XRequestIdHeader'
        - $ref: '#/components/parameters/XCorrelationIdHeader'
        - $ref: '#/components/parameters/OperatorIdPath'
