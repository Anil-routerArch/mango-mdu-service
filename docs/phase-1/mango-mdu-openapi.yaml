        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    put:
      tags: [Operators]
      summary: Update operator details
      description: Updates the target operator name, description, or registration ID.
      operationId: updateOperator
      parameters:
        - $ref: '#/components/parameters/XRequestIdHeader'
        - $ref: '#/components/parameters/XCorrelationIdHeader'
        - $ref: '#/components/parameters/OperatorIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOperatorRequest'
      responses:
        '200':
          description: Operator updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorDetail'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'
    delete:
      tags: [Operators]
      summary: Delete an operator
      description: Deletes the target operator/customer from the system.
      operationId: deleteOperator
      parameters:
        - $ref: '#/components/parameters/XRequestIdHeader'
        - $ref: '#/components/parameters/XCorrelationIdHeader'
        - $ref: '#/components/parameters/OperatorIdPath'
      responses:
        '204':
          description: Operator deleted
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '503':
          $ref: '#/components/responses/BackendUnavailableError'

  /operators/{operatorId}/subscribers:
    get:
      tags: [Subscribers]
      summary: List subscribers for an operator
      description: Returns a simple, unpaginated list of subscriber signup entries associated with the target operator for Phase 1. This endpoint is a constrained listing flow and does not support advanced query parameters for pagination, sorting, or filtering.
      operationId: listOperatorSubscribers
      parameters:
